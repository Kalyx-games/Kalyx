<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // Applique le thème choisi avant le rendu (évite un flash clair au chargement).
      try {
        var t = localStorage.getItem('kalyx-theme')
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t)
        var dark = t === 'dark' || (t !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.querySelector('meta[name="theme-color"]').setAttribute('content', dark ? '#10151d' : '#ffffff')
      } catch (e) {}
    </script>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch.png" />
    <title>Kalyx</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
